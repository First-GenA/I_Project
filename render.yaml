databases:
  - name: financedb
    plan: free
    user: postgres

services:
  - type: web
    plan: free
    name: personal
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "python -m gunicorn personalWeb.asgi:application -k uvicorn.Workers.UvicornWorker"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: financedb
          property: connectionString
      - key: SECRET_KEY
        generatrValue: true
      - key: WEB_CONCURRENcy
        value: 4

