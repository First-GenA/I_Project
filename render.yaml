services:
  - type: web
    plan: free
    name: personal
    runtime: python3
    buildCommand: "./build.sh"
    startCommand: "python -m gunicorn personalWeb.personalWeb.asgi:application -k uvicorn.workers.UvicornWorker"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: financedb
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
    autoDeploy: true


databases:
  - name: financedb
    plan: free
    ipAllowList: []
