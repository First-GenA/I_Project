services:
  - type: web
    plan: free
    name: personal
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "python -m gunicorn personalWeb.wsgi:application -k uvicorn.Workers.UvicornWorker"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: personalWeb.settings
      - key: SECRET_KEY
        generatrValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: DATABASE_URL
        fromDatabase:
          name: financedb
          property: connectionString
    autoDeploy: true


databases:
  - name: financedb
    plan: free
    ipAllowList: []
