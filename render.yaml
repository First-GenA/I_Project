databases:
  - name: financedb
    plan: free
    databaseName: postgres
    user: postgres

services:
  - type: web
    plan: free
    name: personalWeb
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "python -m gunicorn personalWeb.asgi:application -k uvicorn.Workers.UvicornWorker"
    envVars:
      - key: postgresql://postgres:fairygodmother@localhost:5432/postgres
        fromDatabase:
          name: postgres
          property: connectionString
      - key: SECRET_KEY
        generatrValue: true
      - key: WEB_CONCURRENcy
        value: 4

